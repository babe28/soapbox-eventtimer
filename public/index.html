<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Soapbox Event Timer Mock</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell app-shell-dashboard">
      <header class="hero hero-compact hero-dashboard">
        <div class="hero-main">
          <p class="eyebrow">Soapbox Event Timer</p>
          <h1>イベントダッシュボード</h1>
          <p class="hero-copy">
            進行中の予定、全体オフセット、俯瞰スケジュールをまとめて確認するメイン画面です。
          </p>
        </div>
        <div class="hero-tools">
          <div class="top-nav top-nav-header">
            <a class="nav-link current" href="/">Dashboard</a>
            <a class="nav-link" href="/schedule.html">Settings</a>
          </div>
          <div class="hero-status hero-status-wide">
            <div class="status-chip status-chip-donut">
              <span>全体消化率</span>
              <div class="status-donut">
                <div id="event-progress-donut" class="donut-ring"><span id="event-progress-value">0%</span></div>
                <strong id="event-progress-label">0 / 0</strong>
              </div>
            </div>
            <div class="status-chip status-chip-donut">
              <span>最終終了まで</span>
              <div class="status-donut">
                <div id="final-end-donut" class="donut-ring"><span id="final-end-value">--:--:--</span></div>
                <strong id="final-end-label">--:--:--</strong>
              </div>
            </div>
            <div class="status-chip">
              <span>進行差分</span>
              <strong id="offset-status">定刻</strong>
            </div>
            <div class="status-chip status-chip-double">
              <div class="status-inline">
                <span>Socket</span>
                <strong id="socket-status">Connecting</strong>
              </div>
              <div class="status-inline">
                <span>表示時刻</span>
                <strong id="displayed-time">--:--:--</strong>
              </div>
            </div>
          </div>
        </div>
      </header>

      <main class="dashboard-stage">
        <section class="panel panel-control panel-compact">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">Overview</p>
              <h2>進行コントロール</h2>
            </div>
          </div>

          <div class="overview-metrics">
            <article class="metric-card">
              <span>グローバルオフセット</span>
              <strong id="offset-seconds">0s</strong>
            </article>
            <article class="metric-card">
              <span>現在の進行</span>
              <strong id="current-schedule">待機中</strong>
            </article>
            <article class="metric-card">
              <span>全イベント数</span>
              <strong id="schedule-count">0</strong>
            </article>
          </div>

          <div class="offset-controls">
            <button data-offset="-300">-5m</button>
            <button data-offset="-60">-1m</button>
            <button data-offset="-30">-30s</button>
            <button data-offset="30">+30s</button>
            <button data-offset="60">+1m</button>
            <button data-offset="300">+5m</button>
          </div>
        </section>

        <section class="panel panel-feature">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">Main</p>
              <h2>現在進行中のイベント</h2>
            </div>
          </div>
          <div id="current-event" class="current-event-card">
            <p class="empty-state">進行中のイベントはありません。</p>
          </div>
        </section>

        <section class="panel panel-timeline">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">Live Run</p>
              <h2>俯瞰スケジュール</h2>
            </div>
          </div>
          <div id="schedule-list" class="schedule-list"></div>
        </section>

        <section class="panel panel-timers panel-compact">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">Timers</p>
              <h2>独立タイマー</h2>
            </div>
          </div>
          <div id="timer-list" class="timer-list"></div>
        </section>
      </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
