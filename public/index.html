<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Soapbox Event Timer Mock</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell app-shell-dashboard">
      <header class="hero hero-compact">
        <div class="hero-main">
          <div>
            <p class="eyebrow">Soapbox Event Timer</p>
            <h1>イベントダッシュボード</h1>
            <p class="hero-copy">
              本番表示と進行操作を 1 画面で確認するためのダッシュボードです。
            </p>
          </div>
          <div class="top-nav">
            <a class="nav-link current" href="/">Dashboard</a>
            <a class="nav-link" href="/schedule.html">Settings</a>
          </div>
        </div>
        <div class="hero-status">
          <div class="status-chip">
            <span>Socket</span>
            <strong id="socket-status">Connecting</strong>
          </div>
          <div class="status-chip">
            <span>表示時刻</span>
            <strong id="displayed-time">--:--:--</strong>
          </div>
        </div>
      </header>

      <main class="dashboard-grid dashboard-grid-compact">
        <section class="panel panel-primary panel-compact">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">Overview</p>
              <h2>進行コントロール</h2>
            </div>
          </div>

          <div class="overview-metrics">
            <article class="metric-card">
              <span>グローバルオフセット</span>
              <strong id="offset-seconds">0s</strong>
            </article>
            <article class="metric-card">
              <span>現在の進行</span>
              <strong id="current-schedule">待機中</strong>
            </article>
            <article class="metric-card">
              <span>全イベント数</span>
              <strong id="schedule-count">0</strong>
            </article>
          </div>

          <div class="offset-controls">
            <button data-offset="-300">-5m</button>
            <button data-offset="-60">-1m</button>
            <button data-offset="-30">-30s</button>
            <button data-offset="30">+30s</button>
            <button data-offset="60">+1m</button>
            <button data-offset="300">+5m</button>
          </div>
        </section>

        <section class="panel panel-feature">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">Main</p>
              <h2>現在進行中のイベント</h2>
            </div>
          </div>
          <div id="current-event" class="current-event-card">
            <p class="empty-state">進行中のイベントはありません。</p>
          </div>
        </section>

        <section class="panel panel-timeline">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">Live Run</p>
              <h2>スケジュール一覧</h2>
            </div>
          </div>
          <div id="schedule-list" class="schedule-list"></div>
        </section>

        <section class="panel panel-secondary panel-compact">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">Timers</p>
              <h2>手動タイマー</h2>
            </div>
          </div>
          <div id="timer-list" class="timer-list"></div>
        </section>
      </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
