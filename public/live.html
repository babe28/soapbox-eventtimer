<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>現在進行表示</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="live-view-body">
    <main class="live-view-shell">
      <section id="live-view" class="live-view-card" aria-live="polite">
        <div class="live-view-topbar">
          <p class="live-view-kicker">Now On Stage</p>
          <p id="live-browser-time" class="live-view-browser-time">----/--/--(--) --:--:--</p>
        </div>
        <div class="live-view-main">
          <div class="live-view-copy">
            <h1><span id="live-title">イベント待機中</span><span id="live-subtitle" class="live-view-subtitle-inline">現在進行中のプログラムはありません</span></h1>
          </div>
          <div class="live-view-timer">
            <span>残り時間</span>
            <strong id="live-remaining">--:--:--</strong>
          </div>
        </div>
        <div class="live-view-progress-meta">
          <span id="live-progress-label">進行状況</span>
        </div>
        <div class="live-view-progress" aria-hidden="true">
          <span id="live-progress-bar"><strong id="live-progress-value">0%</strong></span>
        </div>
        <div id="live-message" class="live-view-message" hidden>
          <p id="live-message-line1"></p>
          <p id="live-message-line2"></p>
        </div>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/live.js"></script>
  </body>
</html>
