<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Race Clock</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="race-clock-body">
    <main class="race-clock-shell">
      <section class="race-clock-stage" aria-live="polite">
        <div id="race-clock-face" class="race-clock-face">
          <div id="race-clock-hour-hand" class="race-clock-hand hour" aria-hidden="true"></div>
          <div id="race-clock-minute-hand" class="race-clock-hand minute" aria-hidden="true"></div>
          <div id="race-clock-second-hand" class="race-clock-hand second" aria-hidden="true"></div>
          <div class="race-clock-center" aria-hidden="true"></div>
          <p class="race-clock-caption">次のレースまで</p>
          <div class="race-clock-countdown">
            <p id="race-clock-remaining" class="race-clock-remaining">--分--秒</p>
          </div>
          <p id="race-clock-next-title" class="race-clock-next-title"></p>
        </div>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/race-clock.js"></script>
  </body>
</html>
