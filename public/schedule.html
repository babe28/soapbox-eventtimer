<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Schedule Editor</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Soapbox Event Timer</p>
          <h1>Schedule Editor</h1>
          <p class="hero-copy">
            `schedule.json` を直接編集せずに、イベントの追加・更新・削除・並び替えを行う簡易管理画面です。
          </p>
          <div class="top-nav">
            <a class="nav-link" href="/">Dashboard</a>
            <a class="nav-link current" href="/schedule.html">Schedule Editor</a>
          </div>
        </div>
        <div class="hero-status">
          <div class="status-chip">
            <span>Entries</span>
            <strong id="entry-count">0</strong>
          </div>
          <div class="status-chip">
            <span>Status</span>
            <strong id="editor-status">Loading</strong>
          </div>
        </div>
      </header>

      <main class="dashboard-grid">
        <section class="panel">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">Schedule</p>
              <h2>Entries</h2>
            </div>
            <button id="add-entry" class="ghost-button">Add Entry</button>
          </div>
          <div id="editor-list" class="editor-list"></div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">Edit</p>
              <h2>Entry Form</h2>
            </div>
          </div>
          <form id="entry-form" class="editor-form">
            <label>
              <span>ID</span>
              <input name="id" type="text" required />
            </label>
            <label>
              <span>Title</span>
              <input name="title" type="text" required />
            </label>
            <label>
              <span>Subtitle</span>
              <input name="subTitle" type="text" />
            </label>
            <label>
              <span>Start</span>
              <input name="start" type="datetime-local" required />
            </label>
            <label>
              <span>Duration (sec)</span>
              <input name="duration" type="number" min="1" required />
            </label>
            <label>
              <span>Section</span>
              <input name="section" type="text" required />
            </label>
            <label>
              <span>Type</span>
              <select name="type">
                <option value="normal">normal</option>
                <option value="break">break</option>
                <option value="buffer">buffer</option>
                <option value="special">special</option>
              </select>
            </label>
            <div class="editor-actions">
              <button type="submit">Apply Changes</button>
              <button type="button" id="duplicate-entry" class="ghost-button">Duplicate</button>
              <button type="button" id="delete-entry" class="danger-button">Delete</button>
            </div>
          </form>
        </section>

        <section class="panel panel-secondary">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">Persist</p>
              <h2>Save Schedule</h2>
            </div>
          </div>
          <div class="editor-footer">
            <p id="save-note" class="editor-note">Changes are local to this page until you save.</p>
            <div class="editor-actions">
              <button id="sort-entries" type="button" class="ghost-button">Sort By Start</button>
              <button id="save-schedule" type="button">Save To JSON</button>
            </div>
          </div>
          <pre id="schedule-preview"></pre>
        </section>
      </main>
    </div>

    <script src="/schedule-editor.js"></script>
  </body>
</html>
